<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Svenska — Learn Swedish</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --card:     #22263a;
      --border:   #2e3350;
      --accent:   #5b7fff;
      --accent2:  #a78bfa;
      --green:    #34d399;
      --red:      #f87171;
      --yellow:   #fbbf24;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   14px;
      --shadow:   0 4px 24px rgba(0,0,0,.4);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .screen { display: none; width: 100%; max-width: 720px; padding: 24px 16px; }
    .screen.active { display: block; }

    /* ── Login ───────────────────────────────────────────────── */
    #login-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }
    #login-screen.active { display: flex; }
    .logo { font-size: 3rem; font-weight: 800; letter-spacing: -1px; }
    .logo span { color: var(--accent); }
    .tagline { color: var(--muted); font-size: 1rem; }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
    }
    .login-card h2 { margin-bottom: 20px; font-size: 1.2rem; }

    input[type=text] {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 14px;
    }
    input[type=text]:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 10px;
      border: none;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { background: #4a6eee; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); }
    .btn-sm { padding: 8px 16px; font-size: .85rem; }

    /* ── Top bar ─────────────────────────────────────────────── */
    .topbar {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-logo { font-weight: 800; font-size: 1.2rem; color: var(--accent); cursor: pointer; }
    .topbar-user { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem;
    }

    /* ── Dashboard ───────────────────────────────────────────── */
    .dash-header { margin-bottom: 16px; }
    .dash-header h1 { font-size: 1.6rem; font-weight: 700; }
    .dash-header p { color: var(--muted); margin-top: 4px; }

    .mode-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .mode-banner-label { font-size: .85rem; color: var(--muted); font-weight: 600; }

    .game-mode-btn {
      padding: 8px 16px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: .85rem;
      cursor: pointer;
      transition: all .15s;
      font-weight: 500;
    }
    .game-mode-btn:hover { border-color: var(--accent); }
    .game-mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .chapters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    .chapter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .chapter-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      height: 3px; width: 100%;
      background: var(--accent);
      opacity: 0;
      transition: opacity .2s;
    }
    .chapter-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .chapter-card:hover::before { opacity: 1; }

    .ch-num { font-size: .7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .ch-title { font-size: 1rem; font-weight: 700; margin: 4px 0 10px; }
    .ch-words { font-size: .75rem; color: var(--muted); margin-bottom: 10px; }

    .progress-bar-wrap { background: var(--bg); border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 99px; background: var(--accent); transition: width .4s; }

    .ch-score {
      display: flex; justify-content: space-between;
      margin-top: 10px; font-size: .8rem;
    }
    .score-val { font-weight: 700; }
    .score-val.good { color: var(--green); }
    .score-val.ok   { color: var(--yellow); }
    .score-val.bad  { color: var(--red); }
    .score-val.none { color: var(--muted); }

    .badge-new {
      display: inline-block;
      font-size: .65rem; font-weight: 700;
      background: var(--accent); color: #fff;
      border-radius: 99px; padding: 2px 8px;
      text-transform: uppercase; letter-spacing: .05em;
    }

    /* ── Quiz Screen ─────────────────────────────────────────── */
    .quiz-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .quiz-meta { flex: 1; min-width: 150px; }
    .quiz-meta h2 { font-size: 1.1rem; font-weight: 700; }
    .quiz-meta p { color: var(--muted); font-size: .85rem; }

    .quiz-progress-bar-wrap { background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; margin-bottom: 24px; }
    .quiz-progress-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .3s; }

    .flash-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 32px;
      text-align: center;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      cursor: pointer;
      user-select: none;
      transition: transform .15s;
    }
    .flash-card:active { transform: scale(.98); }
    .flash-label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 16px; }
    .flash-word { font-size: 2.4rem; font-weight: 800; letter-spacing: -1px; }
    .flash-hint { color: var(--muted); font-size: .85rem; margin-top: 14px; }

    .direction-toggle, .mode-toggle {
      display: flex; justify-content: center;
      gap: 8px; margin-bottom: 16px;
    }
    .dir-btn, .mode-btn {
      padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: .8rem; cursor: pointer;
      transition: all .15s;
    }
    .dir-btn.active, .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .answer-area { display: flex; gap: 12px; margin-bottom: 16px; }
    .answer-area input { flex: 1; margin: 0; }

    .choices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .choice-btn {
      padding: 14px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: .95rem;
      cursor: pointer;
      transition: all .15s;
      text-align: left;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(91,127,255,.1); }
    .choice-btn.correct { border-color: var(--green); background: rgba(52,211,153,.15); color: var(--green); }
    .choice-btn.wrong   { border-color: var(--red);   background: rgba(248,113,113,.15); color: var(--red); }
    .choice-btn:disabled { cursor: default; }

    .feedback-bar {
      text-align: center; font-size: .95rem; font-weight: 600;
      padding: 10px; border-radius: 10px; margin-bottom: 16px;
      display: none;
    }
    .feedback-bar.correct { display: block; background: rgba(52,211,153,.15); color: var(--green); }
    .feedback-bar.wrong   { display: block; background: rgba(248,113,113,.15); color: var(--red); }

    .quiz-controls { display: flex; justify-content: space-between; align-items: center; }

    .stats-row {
      display: flex; gap: 8px; justify-content: center;
      margin-bottom: 0;
      flex-wrap: wrap;
    }
    .stat-pill {
      padding: 6px 14px; border-radius: 99px;
      font-size: .85rem; font-weight: 600;
    }
    .stat-pill.correct { background: rgba(52,211,153,.15); color: var(--green); }
    .stat-pill.wrong   { background: rgba(248,113,113,.15); color: var(--red); }
    .stat-pill.lives   { background: rgba(248,113,113,.15); color: var(--red); }
    .stat-pill.timer   { background: rgba(91,127,255,.15); color: var(--accent); }
    .stat-pill.timer.warning { background: rgba(248,113,113,.15); color: var(--red); }

    /* ── Flashcard rating buttons ────────────────────────────── */
    .rating-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .rating-btn {
      padding: 16px 12px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
      transition: all .15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .rating-btn:hover { transform: translateY(-2px); }
    .rating-btn .em { font-size: 1.5rem; }
    .rating-btn .lbl { font-size: .85rem; }
    .rating-btn.unknown:hover { border-color: var(--red); background: rgba(248,113,113,.1); }
    .rating-btn.hard:hover    { border-color: var(--yellow); background: rgba(251,191,36,.1); }
    .rating-btn.easy:hover    { border-color: var(--green); background: rgba(52,211,153,.1); }

    /* ── Results Screen ──────────────────────────────────────── */
    .results-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      text-align: center;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .results-emoji { font-size: 3rem; margin-bottom: 12px; }
    .results-score { font-size: 3.5rem; font-weight: 800; margin-bottom: 4px; }
    .results-label { color: var(--muted); }
    .results-breakdown { display: flex; justify-content: center; gap: 32px; margin: 20px 0 0; flex-wrap: wrap; }
    .rb-item { text-align: center; }
    .rb-val { font-size: 1.4rem; font-weight: 700; }
    .rb-label { font-size: .75rem; color: var(--muted); }

    .leaderboard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .lb-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: .9rem; }
    .lb-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-size: .9rem;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank { width: 24px; font-weight: 700; color: var(--muted); }
    .lb-name { flex: 1; }
    .lb-score { font-weight: 700; }

    .results-actions { display: flex; gap: 12px; }

    /* ── Mistakes recap ──────────────────────────────────────── */
    .mistakes-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .mistakes-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: .9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mistakes-count {
      background: rgba(248,113,113,.15);
      color: var(--red);
      padding: 2px 10px;
      border-radius: 99px;
      font-size: .75rem;
    }
    .mistake-row {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      font-size: .9rem;
    }
    .mistake-row:last-child { border-bottom: none; }
    .mistake-q { font-weight: 600; }
    .mistake-arrow { color: var(--muted); font-size: 1.2rem; }
    .mistake-a { color: var(--green); font-weight: 600; }
    .mistake-given {
      color: var(--red); font-size: .75rem;
      text-decoration: line-through;
      display: block;
      margin-top: 2px;
    }
    .perfect-card {
      background: rgba(52,211,153,.1);
      border: 1px solid rgba(52,211,153,.3);
      color: var(--green);
      text-align: center;
      padding: 20px;
      border-radius: var(--radius);
      margin-bottom: 24px;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .chapters-grid { grid-template-columns: 1fr 1fr; }
      .flash-word { font-size: 1.8rem; }
      .choices-grid { grid-template-columns: 1fr; }
      .rating-grid { grid-template-columns: 1fr; }
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pulse { animation: pulse .5s ease; }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* ── Streak system ───────────────────────────────────────── */
    body {
      transition: background .6s ease;
    }
    body.streak-tier-1 { background: radial-gradient(ellipse at top, #1a1f3a 0%, var(--bg) 60%); }
    body.streak-tier-2 { background: radial-gradient(ellipse at top, #2a1f4a 0%, var(--bg) 65%); }
    body.streak-tier-3 {
      background: radial-gradient(ellipse at top, #3a1a5a 0%, var(--bg) 70%);
      animation: bg-pulse 2s ease-in-out infinite;
    }
    body.streak-tier-4 {
      background: radial-gradient(ellipse at top, #5b1f6a 0%, #1a1133 70%);
      animation: bg-pulse 1.4s ease-in-out infinite;
    }
    @keyframes bg-pulse {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.25); }
    }

    .streak-pill {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: .85rem;
      font-weight: 700;
      background: linear-gradient(90deg, #fbbf24, #f87171);
      color: #fff;
      transition: transform .2s, box-shadow .3s;
      display: none;
      align-items: center;
      gap: 4px;
    }
    .streak-pill.visible { display: inline-flex; }
    .streak-pill.tier-2 { box-shadow: 0 0 20px rgba(251,191,36,.6); }
    .streak-pill.tier-3 { box-shadow: 0 0 30px rgba(248,113,113,.8); transform: scale(1.05); }
    .streak-pill.tier-4 {
      background: linear-gradient(90deg, #fbbf24, #f87171, #a78bfa);
      background-size: 200% 100%;
      animation: rainbow 1.5s linear infinite;
      box-shadow: 0 0 40px rgba(167,139,250,.9);
      transform: scale(1.1);
    }
    @keyframes rainbow {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .streak-pill.bump { animation: streak-bump .35s ease; }
    @keyframes streak-bump {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    /* Glow on the flash card during high streaks */
    .flash-card.streak-tier-2 { box-shadow: 0 0 30px rgba(251,191,36,.3), var(--shadow); }
    .flash-card.streak-tier-3 { box-shadow: 0 0 50px rgba(248,113,113,.5), var(--shadow); }
    .flash-card.streak-tier-4 {
      box-shadow: 0 0 80px rgba(167,139,250,.6), var(--shadow);
      border-color: var(--accent2);
    }

    /* Screen flash on correct */
    .flash-overlay {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      background: radial-gradient(circle, rgba(52,211,153,.3) 0%, transparent 70%);
    }
    .flash-overlay.fire {
      animation: flash-fire .5s ease;
    }
    @keyframes flash-fire {
      0%   { opacity: 0; }
      30%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Particle / confetti container */
    .particle-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 99;
    }
    .particle {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
    }
    .confetti {
      position: absolute;
      width: 10px; height: 14px;
      pointer-events: none;
      will-change: transform, opacity;
    }

    /* Combo text that flies up */
    .combo-text {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      font-weight: 900;
      pointer-events: none;
      z-index: 101;
      opacity: 0;
      text-shadow: 0 4px 20px rgba(0,0,0,.6);
      letter-spacing: -2px;
    }
    .combo-text.show { animation: combo-fly 1.1s ease-out; }
    @keyframes combo-fly {
      0%   { opacity: 0; transform: translate(-50%, -30%) scale(.5); }
      30%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      70%  { opacity: 1; transform: translate(-50%, -55%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -90%) scale(.9); }
    }
  </style>
</head>
<body>

<div class="flash-overlay" id="flash-overlay"></div>
<div class="particle-layer" id="particle-layer"></div>
<div class="combo-text" id="combo-text"></div>

<!-- ══ LOGIN ══════════════════════════════════════════════════════════════ -->
<div id="login-screen" class="screen active">
  <div class="logo">Svens<span>ka</span></div>
  <p class="tagline">Master 930 Swedish words, one chapter at a time.</p>
  <div class="login-card">
    <h2>Enter your name to start</h2>
    <input type="text" id="username-input" placeholder="e.g. alice" maxlength="30" />
    <button class="btn btn-primary" onclick="login()">Let's go →</button>
  </div>
</div>

<!-- ══ TOP BAR ════════════════════════════════════════════════════════════ -->
<div class="topbar" id="topbar" style="display:none">
  <div class="topbar-logo" onclick="showDashboard()">Svenska</div>
  <div class="topbar-user">
    <button class="btn btn-ghost btn-sm" id="sound-toggle" onclick="toggleSound()" title="Toggle sound" style="padding:8px 10px">🔊</button>
    <div class="avatar" id="avatar-initial">?</div>
    <span id="topbar-username" style="font-size:.9rem"></span>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
  </div>
</div>

<!-- ══ DASHBOARD ══════════════════════════════════════════════════════════ -->
<div id="dashboard-screen" class="screen">
  <div class="dash-header">
    <h1 id="dash-greeting">Hello!</h1>
    <p>Pick a game mode and a chapter to play.</p>
    <a href="/quest.html" style="display:inline-block;margin-top:12px;padding:10px 20px;background:linear-gradient(135deg,#ff6b9d,#a78bfa);color:#fff;text-decoration:none;border-radius:10px;font-weight:700;font-size:.9rem;box-shadow:0 4px 16px rgba(167,139,250,.3)">
      🐉 Try Word Quest — RPG Mode →
    </a>
  </div>
  <div class="mode-banner">
    <span class="mode-banner-label">Mode:</span>
    <button class="game-mode-btn active" data-mode="mcq"      onclick="setGameMode(this)">📝 Multiple choice</button>
    <button class="game-mode-btn"        data-mode="type"     onclick="setGameMode(this)">⌨️ Typing</button>
    <button class="game-mode-btn"        data-mode="flashcard" onclick="setGameMode(this)">🎴 Flashcards</button>
    <button class="game-mode-btn"        data-mode="survival" onclick="setGameMode(this)">❤️ Survival</button>
    <button class="game-mode-btn"        data-mode="speed"    onclick="setGameMode(this)">⏱️ Speed (60s)</button>
  </div>
  <div class="chapters-grid" id="chapters-grid">
    <div class="spinner"></div>
  </div>
</div>

<!-- ══ QUIZ ═══════════════════════════════════════════════════════════════ -->
<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <button class="btn btn-ghost btn-sm" onclick="showDashboard()">← Back</button>
    <div class="quiz-meta">
      <h2 id="quiz-chapter-title">Chapter 1</h2>
      <p id="quiz-progress-text">Question 1 / 25</p>
    </div>
    <div class="stats-row" id="stats-row"></div>
  </div>

  <div class="quiz-progress-bar-wrap">
    <div class="quiz-progress-bar" id="quiz-progress-bar" style="width:0%"></div>
  </div>

  <div class="direction-toggle" id="direction-toggle">
    <button class="dir-btn active" id="dir-sv-en" onclick="setDirection('sv-en')">🇸🇪 → 🇬🇧</button>
    <button class="dir-btn" id="dir-en-sv" onclick="setDirection('en-sv')">🇬🇧 → 🇸🇪</button>
  </div>

  <div class="flash-card" id="flash-card" onclick="onFlashCardClick()">
    <div class="flash-label" id="flash-label">Swedish</div>
    <div class="flash-word" id="flash-word">—</div>
    <div class="flash-hint" id="flash-hint" style="display:none"></div>
  </div>

  <div class="choices-grid" id="choices-grid"></div>

  <div class="answer-area" id="answer-area" style="display:none">
    <input type="text" id="type-answer" placeholder="Type the translation…" onkeydown="handleTypeKey(event)" />
    <button class="btn btn-primary" onclick="checkTyped()">Check</button>
  </div>

  <div class="rating-grid" id="rating-grid" style="display:none">
    <button class="rating-btn unknown" onclick="rateFlashcard('unknown')">
      <span class="em">😵</span><span class="lbl">Don't know</span>
    </button>
    <button class="rating-btn hard" onclick="rateFlashcard('hard')">
      <span class="em">🤔</span><span class="lbl">Hard</span>
    </button>
    <button class="rating-btn easy" onclick="rateFlashcard('easy')">
      <span class="em">😎</span><span class="lbl">Easy</span>
    </button>
  </div>

  <div class="feedback-bar" id="feedback-bar"></div>

  <div class="quiz-controls">
    <span style="font-size:.8rem;color:var(--muted)" id="quiz-hint"></span>
    <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Next →</button>
  </div>
</div>

<!-- ══ RESULTS ════════════════════════════════════════════════════════════ -->
<div id="results-screen" class="screen">
  <div class="results-card">
    <div class="results-emoji" id="results-emoji">🎉</div>
    <div class="results-score" id="results-score">—</div>
    <div class="results-label" id="results-label">Chapter 1 complete!</div>
    <div class="results-breakdown" id="results-breakdown"></div>
  </div>

  <div id="mistakes-container"></div>

  <div class="leaderboard" id="leaderboard">
    <div class="lb-header">🏆 Leaderboard — Chapter <span id="lb-chapter">1</span> · <span id="lb-mode">MCQ</span></div>
    <div id="lb-rows"><div class="spinner"></div></div>
  </div>

  <div class="results-actions">
    <button class="btn btn-ghost" style="flex:1" onclick="showDashboard()">← Dashboard</button>
    <button class="btn btn-primary" style="flex:1" id="retry-btn" onclick="retryChapter()">Retry chapter</button>
  </div>
</div>

<script>
// ══ State ════════════════════════════════════════════════════════════════════
let state = {
  username: null,
  chapter: null,
  gameMode: 'mcq',                  // mcq, type, flashcard, survival, speed
  words: [],
  queue: [],
  idx: 0,
  correct: 0,
  wrong: 0,
  lives: 3,
  timer: 60,
  timerInterval: null,
  speedScore: 0,
  flashcardEasy: 0,
  flashcardHard: 0,
  flashcardUnknown: 0,
  flashcardRevealed: false,
  mistakes: [],
  streak: 0,
  bestStreak: 0,
  direction: 'sv-en',
  answered: false,
  progress: {},
  totalChapters: 38,
};

const $ = id => document.getElementById(id);
const shuffle = arr => arr.slice().sort(() => Math.random() - .5);
const norm = s => s.toLowerCase().trim().replace(/\s+/g, ' ');

// ══ Audio system ════════════════════════════════════════════════════════════
const AUDIO = {
  enabled: true,
  ctx: null,
  files: {},     // streak-3, streak-5, streak-8, streak-10
};

function initAudio() {
  // Web Audio context for synthesized beeps. Created lazily on first user
  // interaction (browsers block audio before that).
  if (!AUDIO.ctx) {
    try {
      AUDIO.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch { return; }
  }
  // Preload sound files so they don't lag on first play
  ['streak-3', 'streak-5', 'streak-8', 'streak-10'].forEach(name => {
    if (!AUDIO.files[name]) {
      const a = new Audio(`/sounds/${name}.mp3`);
      a.preload = 'auto';
      a.volume = 0.5;
      AUDIO.files[name] = a;
    }
  });
}

// Initialise on first interaction (required by browser autoplay policy)
document.addEventListener('click', () => {
  if (AUDIO.ctx && AUDIO.ctx.state === 'suspended') AUDIO.ctx.resume();
  initAudio();
}, { once: false });

function loadSoundPref() {
  const stored = localStorage.getItem('svenska-sound');
  AUDIO.enabled = stored !== 'off';
  const btn = $('sound-toggle');
  if (btn) btn.textContent = AUDIO.enabled ? '🔊' : '🔇';
}

function toggleSound() {
  AUDIO.enabled = !AUDIO.enabled;
  localStorage.setItem('svenska-sound', AUDIO.enabled ? 'on' : 'off');
  $('sound-toggle').textContent = AUDIO.enabled ? '🔊' : '🔇';
  if (AUDIO.enabled) playDing(0);   // confirmation beep
}

// Synth: short pleasant tone. `pitch` is a semitone offset from base.
function playDing(pitchSteps = 0) {
  if (!AUDIO.enabled || !AUDIO.ctx) return;
  const ctx = AUDIO.ctx;
  const t = ctx.currentTime;
  const baseFreq = 660; // E5
  const freq = baseFreq * Math.pow(2, pitchSteps / 12);

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * 1.5, t + 0.05);
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(0.25, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);

  osc.connect(gain).connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.2);
}

// Synth: low thud for wrong answer
function playThud() {
  if (!AUDIO.enabled || !AUDIO.ctx) return;
  const ctx = AUDIO.ctx;
  const t = ctx.currentTime;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(220, t);
  osc.frequency.exponentialRampToValueAtTime(80, t + 0.18);
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(0.25, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);

  osc.connect(gain).connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.25);
}

// Short ascending arpeggio for end-of-chapter
function playFanfare() {
  if (!AUDIO.enabled || !AUDIO.ctx) return;
  [0, 4, 7, 12].forEach((step, i) => {
    setTimeout(() => playDing(step), i * 90);
  });
}

// File-based sound for streak milestones
function playStreakSound(tier) {
  if (!AUDIO.enabled) return;
  const name = `streak-${tier}`;
  const a = AUDIO.files[name];
  if (!a) return;
  // Clone so overlapping plays work
  const clone = a.cloneNode();
  clone.volume = 0.5;
  clone.play().catch(() => {});
}

const MODE_LABELS = {
  mcq: 'Multiple choice',
  type: 'Typing',
  flashcard: 'Flashcards',
  survival: 'Survival',
  speed: 'Speed round',
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  $('topbar').style.display = id === 'login-screen' ? 'none' : 'flex';
}

function scoreColor(pct) {
  if (pct === null || pct === undefined) return 'none';
  if (pct >= 80) return 'good';
  if (pct >= 50) return 'ok';
  return 'bad';
}

function scoreEmoji(pct) {
  if (pct >= 90) return '🏆';
  if (pct >= 70) return '🎉';
  if (pct >= 50) return '👍';
  return '💪';
}

// ══ API ═════════════════════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ══ Login ═══════════════════════════════════════════════════════════════════
async function login() {
  const val = $('username-input').value.trim();
  if (!val) return;
  try {
    const { username } = await api('POST', '/api/login', { username: val });
    state.username = username;
    $('avatar-initial').textContent = username[0].toUpperCase();
    $('topbar-username').textContent = username;
    loadSoundPref();
    initAudio();
    await showDashboard();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}
$('username-input').addEventListener('keydown', e => e.key === 'Enter' && login());

function logout() {
  state.username = null;
  showScreen('login-screen');
  $('username-input').value = '';
}

// ══ Dashboard ═══════════════════════════════════════════════════════════════
function setGameMode(btn) {
  document.querySelectorAll('.game-mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.gameMode = btn.dataset.mode;
  renderChapters();
}

async function showDashboard() {
  showScreen('dashboard-screen');
  $('dash-greeting').textContent = `Hello, ${state.username}! 👋`;
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }

  // Clear any leftover streak visuals
  document.body.classList.remove('streak-tier-1','streak-tier-2','streak-tier-3','streak-tier-4');
  state.streak = 0;

  try {
    state.progress = await api('GET', `/api/progress/${state.username}`);
  } catch { state.progress = {}; }

  try {
    const info = await api('GET', '/api/info');
    state.totalChapters = info.total_chapters;
  } catch { state.totalChapters = 38; }

  renderChapters();
}

function renderChapters() {
  const grid = $('chapters-grid');
  grid.innerHTML = '';
  const mode = state.gameMode;
  const isBestScoreMode = (mode === 'survival' || mode === 'speed');

  for (let i = 1; i <= state.totalChapters; i++) {
    const chProgress = state.progress[String(i)];
    const modeProgress = chProgress ? chProgress[mode] : null;

    let pct = null;
    let displayText = 'Not started';
    let barWidth = 0;
    let attemptsText = '';

    if (modeProgress) {
      if (isBestScoreMode) {
        // Survival/Speed: show best score (number of words)
        const best = modeProgress.best_score || 0;
        displayText = `${best} ${best === 1 ? 'word' : 'words'}`;
        // Bar = best/25 capped at 100%
        barWidth = Math.min(best / 25 * 100, 100);
        attemptsText = modeProgress.total ? ` · ${modeProgress.total} tried` : '';
      } else {
        // MCQ/Type/Flashcard: show accuracy %
        pct = modeProgress.score;
        displayText = `${pct}%`;
        barWidth = Math.min(modeProgress.correct / 25 * 100, 100);
        attemptsText = ` · ${modeProgress.total} attempts`;
      }
    }

    const color = scoreColor(pct);
    const card = document.createElement('div');
    card.className = 'chapter-card';
    card.onclick = () => startChapter(i);
    card.innerHTML = `
      <div class="ch-num">Chapter ${i}</div>
      <div class="ch-title">Group ${i}</div>
      <div class="ch-words">25 words${attemptsText}</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" style="width:${barWidth}%"></div>
      </div>
      <div class="ch-score">
        <span class="score-val ${modeProgress ? color : 'none'}">${displayText}</span>
        ${!modeProgress ? '<span class="badge-new">New</span>' : ''}
      </div>
    `;
    grid.appendChild(card);
  }
}

// ══ Quiz Start ══════════════════════════════════════════════════════════════
async function startChapter(chapter) {
  state.chapter = chapter;
  state.correct = 0;
  state.wrong = 0;
  state.idx = 0;
  state.lives = 3;
  state.timer = 60;
  state.speedScore = 0;
  state.flashcardEasy = 0;
  state.flashcardHard = 0;
  state.flashcardUnknown = 0;
  state.flashcardRevealed = false;
  state.mistakes = [];
  state.streak = 0;
  state.bestStreak = 0;
  state.answered = false;

  showScreen('quiz-screen');
  $('quiz-chapter-title').textContent = `Chapter ${chapter} · ${MODE_LABELS[state.gameMode]}`;

  try {
    if (state.gameMode === 'flashcard') {
      const data = await api('GET', `/api/flashcards/${state.username}/${chapter}`);
      state.words = data.cards;  // already sorted by ease
      state.queue = [...state.words];
    } else {
      const data = await api('GET', `/api/words/${chapter}`);
      state.words = data.words;
      state.queue = shuffle(state.words);
    }

    setupModeUI();

    if (state.gameMode === 'speed') startSpeedTimer();

    renderQuestion();
  } catch (e) {
    alert('Failed to load: ' + e.message);
  }
}

function retryChapter() { startChapter(state.chapter); }

// ══ Mode-specific UI setup ═════════════════════════════════════════════════
function setupModeUI() {
  const m = state.gameMode;
  const dirToggle = $('direction-toggle');
  const choices = $('choices-grid');
  const answer = $('answer-area');
  const rating = $('rating-grid');

  // Direction toggle: hide for flashcard mode (cards have their own flow)
  dirToggle.style.display = (m === 'flashcard') ? 'none' : 'flex';

  // Hide everything by default
  choices.style.display = 'none';
  answer.style.display = 'none';
  rating.style.display = 'none';

  // Stats row content depends on mode
  const statsRow = $('stats-row');
  if (m === 'survival') {
    statsRow.innerHTML = `
      <div class="stat-pill correct" id="stat-correct">✓ 0</div>
      <div class="stat-pill lives" id="stat-lives">❤️ 3</div>
    `;
  } else if (m === 'speed') {
    statsRow.innerHTML = `
      <div class="stat-pill correct" id="stat-correct">✓ 0</div>
      <div class="stat-pill timer" id="stat-timer">⏱️ 60s</div>
    `;
  } else if (m === 'flashcard') {
    statsRow.innerHTML = `
      <div class="stat-pill correct">😎 0</div>
      <div class="stat-pill" style="background:rgba(251,191,36,.15);color:var(--yellow)">🤔 0</div>
      <div class="stat-pill wrong">😵 0</div>
    `;
  } else {
    statsRow.innerHTML = `
      <div class="stat-pill correct" id="stat-correct">✓ 0</div>
      <div class="stat-pill wrong" id="stat-wrong">✗ 0</div>
      <div class="streak-pill" id="streak-pill">🔥 <span id="streak-num">0</span></div>
    `;
  }
}

// ══ Speed timer ════════════════════════════════════════════════════════════
function startSpeedTimer() {
  state.timer = 60;
  state.timerInterval = setInterval(() => {
    state.timer--;
    const pill = $('stat-timer');
    if (pill) {
      pill.textContent = `⏱️ ${state.timer}s`;
      pill.classList.toggle('warning', state.timer <= 10);
    }
    if (state.timer <= 0) {
      clearInterval(state.timerInterval);
      finishQuiz();
    }
  }, 1000);
}

// ══ Direction ══════════════════════════════════════════════════════════════
function setDirection(d) {
  state.direction = d;
  $('dir-sv-en').classList.toggle('active', d === 'sv-en');
  $('dir-en-sv').classList.toggle('active', d === 'en-sv');
  if (state.idx < state.queue.length) renderQuestion();
}

// ══ Render Question ════════════════════════════════════════════════════════
function renderQuestion() {
  // Speed mode: never run out — loop the queue
  if (state.gameMode === 'speed' && state.idx >= state.queue.length) {
    state.queue = shuffle(state.words);
    state.idx = 0;
  }

  if (state.idx >= state.queue.length) {
    finishQuiz();
    return;
  }

  state.answered = false;
  state.flashcardRevealed = false;
  const word = state.queue[state.idx];

  // Update stats display
  updateStatsDisplay();

  // Progress bar (not used for speed/survival)
  if (state.gameMode === 'survival' || state.gameMode === 'speed') {
    $('quiz-progress-text').textContent = `Word ${state.idx + 1}`;
    $('quiz-progress-bar').style.width = '50%';
  } else {
    const total = state.queue.length;
    $('quiz-progress-text').textContent = `Question ${state.idx + 1} / ${total}`;
    $('quiz-progress-bar').style.width = (state.idx / total * 100) + '%';
  }

  // Reset feedback / next button / hints
  const fb = $('feedback-bar');
  fb.className = 'feedback-bar';
  fb.textContent = '';
  $('next-btn').style.display = 'none';
  $('quiz-hint').textContent = '';
  $('flash-hint').style.display = 'none';

  // Flashcard mode: show the front of the card, hide controls until reveal
  if (state.gameMode === 'flashcard') {
    const fromLang = 'Swedish';
    $('flash-label').textContent = fromLang;
    $('flash-word').textContent = word.swedish;
    $('flash-hint').textContent = '👆 Tap card to reveal';
    $('flash-hint').style.display = 'block';
    $('rating-grid').style.display = 'none';
    return;
  }

  // Other modes: pick question & answer
  const question = state.direction === 'sv-en' ? word.swedish : word.english;
  const answerKey = state.direction === 'sv-en' ? word.english : word.swedish;
  const fromLang = state.direction === 'sv-en' ? 'Swedish' : 'English';

  $('flash-label').textContent = fromLang;
  $('flash-word').textContent = question;

  if (state.gameMode === 'mcq' || state.gameMode === 'survival' || state.gameMode === 'speed') {
    $('choices-grid').style.display = 'grid';
    $('answer-area').style.display = 'none';
    renderChoices(word, answerKey);
  } else if (state.gameMode === 'type') {
    $('choices-grid').style.display = 'none';
    $('answer-area').style.display = 'flex';
    const inp = $('type-answer');
    inp.value = '';
    inp.disabled = false;
    inp.style.borderColor = '';
    setTimeout(() => inp.focus(), 50);
  }
}

function updateStatsDisplay() {
  if (state.gameMode === 'survival') {
    $('stat-correct').textContent = `✓ ${state.correct}`;
    $('stat-lives').textContent = '❤️'.repeat(state.lives) || '💀';
  } else if (state.gameMode === 'speed') {
    $('stat-correct').textContent = `✓ ${state.correct}`;
  } else if (state.gameMode === 'flashcard') {
    const pills = $('stats-row').querySelectorAll('.stat-pill');
    pills[0].textContent = `😎 ${state.flashcardEasy}`;
    pills[1].textContent = `🤔 ${state.flashcardHard}`;
    pills[2].textContent = `😵 ${state.flashcardUnknown}`;
  } else {
    $('stat-correct').textContent = `✓ ${state.correct}`;
    $('stat-wrong').textContent = `✗ ${state.wrong}`;
  }
}

function renderChoices(word, answerKey) {
  const others = state.words
    .filter(w => w !== word)
    .sort(() => Math.random() - .5)
    .slice(0, 3)
    .map(w => state.direction === 'sv-en' ? w.english : w.swedish);

  const choices = shuffle([answerKey, ...others]);
  const grid = $('choices-grid');
  grid.innerHTML = '';

  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice;
    btn.onclick = () => selectChoice(btn, choice, answerKey, grid);
    grid.appendChild(btn);
  });
}

function selectChoice(btn, choice, answer, grid) {
  if (state.answered) return;
  state.answered = true;

  const isCorrect = norm(choice) === norm(answer);
  grid.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (norm(b.textContent) === norm(answer)) b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');

  if (!isCorrect) {
    const word = state.queue[state.idx];
    const question = state.direction === 'sv-en' ? word.swedish : word.english;
    state.mistakes.push({ question, answer, given: choice });
  }

  recordAnswer(isCorrect, answer);
}

function handleTypeKey(e) {
  if (e.key === 'Enter') {
    if (state.answered) nextQuestion();
    else checkTyped();
  }
}

function checkTyped() {
  if (state.answered) { nextQuestion(); return; }
  const input = $('type-answer').value.trim();
  if (!input) return;
  state.answered = true;

  const word = state.queue[state.idx];
  const answer = state.direction === 'sv-en' ? word.english : word.swedish;
  const isCorrect = norm(input) === norm(answer);

  $('type-answer').style.borderColor = isCorrect ? 'var(--green)' : 'var(--red)';
  $('type-answer').disabled = true;

  if (!isCorrect) {
    const question = state.direction === 'sv-en' ? word.swedish : word.english;
    state.mistakes.push({ question, answer, given: input });
  }

  recordAnswer(isCorrect, answer);
}

function recordAnswer(isCorrect, answer) {
  const fb = $('feedback-bar');
  if (isCorrect) {
    state.correct++;
    fb.textContent = '✓ Correct!';
    fb.className = 'feedback-bar correct';

    // Streak only matters for MCQ mode
    if (state.gameMode === 'mcq') {
      state.streak++;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;
      onStreakChange(state.streak);
      // Pitch climbs with streak so it sounds like a scale
      playDing(Math.min(state.streak - 1, 12));
    } else {
      playDing(0);
    }
  } else {
    state.wrong++;
    fb.textContent = `✗ Answer: ${answer}`;
    fb.className = 'feedback-bar wrong';
    playThud();

    if (state.gameMode === 'mcq' && state.streak > 0) {
      const pill = $('streak-pill');
      if (pill) pill.classList.remove('bump');
      state.streak = 0;
      onStreakChange(0);
    }

    if (state.gameMode === 'survival') {
      state.lives--;
    }
  }

  updateStatsDisplay();

  if (state.gameMode === 'survival' && state.lives <= 0) {
    setTimeout(finishQuiz, 1000);
    return;
  }

  if (state.gameMode === 'speed') {
    setTimeout(() => { state.idx++; renderQuestion(); }, 600);
    return;
  }

  $('next-btn').style.display = 'inline-flex';
}

// ══ Streak visual effects ══════════════════════════════════════════════════
function streakTier(s) {
  if (s >= 10) return 4;
  if (s >= 8)  return 3;
  if (s >= 5)  return 2;
  if (s >= 3)  return 1;
  return 0;
}

function onStreakChange(streak) {
  const pill = $('streak-pill');
  const tier = streakTier(streak);

  // Update body background tier
  document.body.classList.remove('streak-tier-1','streak-tier-2','streak-tier-3','streak-tier-4');
  if (tier > 0) document.body.classList.add(`streak-tier-${tier}`);

  // Update flash card glow tier
  const card = $('flash-card');
  card.classList.remove('streak-tier-2','streak-tier-3','streak-tier-4');
  if (tier >= 2) card.classList.add(`streak-tier-${tier}`);

  // Update streak pill
  if (!pill) return;
  if (streak < 3) {
    pill.classList.remove('visible','tier-2','tier-3','tier-4','bump');
    return;
  }

  pill.classList.add('visible');
  pill.classList.remove('tier-2','tier-3','tier-4');
  if (tier >= 2) pill.classList.add(`tier-${tier}`);

  $('streak-num').textContent = streak;

  // Bump animation
  pill.classList.remove('bump');
  void pill.offsetWidth;        // force reflow so the animation re-runs
  pill.classList.add('bump');

  // Trigger effects on milestones
  if (streak === 3 || streak === 5 || streak === 8 || streak === 10 ||
      (streak > 10 && streak % 5 === 0)) {
    showCombo(streak);
    // Play file sound for the matching tier
    if (streak >= 10)     playStreakSound(10);
    else if (streak >= 8) playStreakSound(8);
    else if (streak >= 5) playStreakSound(5);
    else                  playStreakSound(3);
  }

  // Particles per tier
  if (tier >= 1) emitParticles(tier);

  // Screen flash from tier 2
  if (tier >= 2) {
    const overlay = $('flash-overlay');
    overlay.classList.remove('fire');
    void overlay.offsetWidth;
    overlay.classList.add('fire');
  }

  // Confetti from tier 3
  if (tier >= 3) emitConfetti(tier);
}

function showCombo(streak) {
  const el = $('combo-text');
  let text, color;
  if (streak >= 10) { text = `${streak}x COMBO!`; color = '#a78bfa'; }
  else if (streak >= 8) { text = `${streak}x ON FIRE!`; color = '#f87171'; }
  else if (streak >= 5) { text = `${streak}x STREAK!`; color = '#fbbf24'; }
  else                  { text = `${streak}x!`; color = '#34d399'; }
  el.textContent = text;
  el.style.color = color;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

const PARTICLE_COLORS = ['#fbbf24', '#f87171', '#34d399', '#5b7fff', '#a78bfa'];

function emitParticles(tier) {
  const layer = $('particle-layer');
  const card = $('flash-card').getBoundingClientRect();
  const cx = card.left + card.width / 2;
  const cy = card.top + card.height / 2;
  const count = tier === 1 ? 10 : tier === 2 ? 18 : tier === 3 ? 28 : 40;

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.background = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    layer.appendChild(p);

    const angle = Math.random() * Math.PI * 2;
    const dist  = 80 + Math.random() * 160;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 30; // bias upward
    const dur = 600 + Math.random() * 500;

    p.animate(
      [
        { transform: 'translate(0,0) scale(1)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px) scale(.3)`, opacity: 0 },
      ],
      { duration: dur, easing: 'cubic-bezier(.2,.8,.4,1)', fill: 'forwards' }
    ).onfinish = () => p.remove();
  }
}

function emitConfetti(tier) {
  const layer = $('particle-layer');
  const count = tier === 3 ? 30 : 60;
  const W = window.innerWidth;

  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
    c.style.left = Math.random() * W + 'px';
    c.style.top  = '-20px';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    layer.appendChild(c);

    const drift = (Math.random() - .5) * 200;
    const dur = 1800 + Math.random() * 1500;
    const rot = Math.random() * 720 - 360;

    c.animate(
      [
        { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
        { transform: `translate(${drift}px, ${window.innerHeight + 40}px) rotate(${rot}deg)`, opacity: .8 },
      ],
      { duration: dur, easing: 'cubic-bezier(.2,.6,.4,1)', fill: 'forwards' }
    ).onfinish = () => c.remove();
  }
}

function nextQuestion() {
  state.idx++;
  renderQuestion();
}

// ══ Flashcard mode ═════════════════════════════════════════════════════════
function onFlashCardClick() {
  if (state.gameMode !== 'flashcard') return;
  if (state.flashcardRevealed) return;
  state.flashcardRevealed = true;

  const word = state.queue[state.idx];
  $('flash-label').textContent = 'Swedish · English';
  $('flash-word').innerHTML =
    `${word.swedish}<br><span style="color:var(--accent);font-size:1.6rem">${word.english}</span>`;
  $('flash-hint').style.display = 'none';
  $('rating-grid').style.display = 'grid';
}

async function rateFlashcard(rating) {
  if (state.gameMode !== 'flashcard' || !state.flashcardRevealed) return;
  const word = state.queue[state.idx];

  // Update local stats
  if (rating === 'easy') state.flashcardEasy++;
  else if (rating === 'hard') state.flashcardHard++;
  else state.flashcardUnknown++;

  // Track non-easy as mistakes for the recap
  if (rating !== 'easy') {
    state.mistakes.push({
      question: word.swedish,
      answer: word.english,
      given: rating === 'unknown' ? "(didn't know)" : '(struggled)',
    });
  }

  updateStatsDisplay();

  // Send to server
  try {
    const res = await api('POST', '/api/flashcards/rate', {
      username: state.username,
      chapter: state.chapter,
      word_idx: word.word_idx,
      rating,
    });
    // If unknown → re-queue at end of session
    if (res.requeue) {
      state.queue.push(word);
    }
  } catch (e) {
    console.warn('Could not save rating', e);
    if (rating === 'unknown') state.queue.push(word);
  }

  $('rating-grid').style.display = 'none';
  state.idx++;

  // Small delay before next card
  setTimeout(renderQuestion, 200);
}

// ══ Finish ═════════════════════════════════════════════════════════════════
async function finishQuiz() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }

  const m = state.gameMode;
  let scoreText, emoji, breakdown, payload;

  if (m === 'survival') {
    scoreText = `${state.correct} words`;
    emoji = state.correct >= 20 ? '🏆' : state.correct >= 10 ? '🎉' : '💀';
    breakdown = `
      <div class="rb-item"><div class="rb-val" style="color:var(--green)">${state.correct}</div><div class="rb-label">Correct</div></div>
      <div class="rb-item"><div class="rb-val" style="color:var(--red)">${3 - state.lives}</div><div class="rb-label">Lives lost</div></div>
    `;
    payload = {
      username: state.username, chapter: state.chapter, mode: 'survival',
      correct: state.correct, wrong: state.wrong, score: state.correct,
    };
  } else if (m === 'speed') {
    scoreText = `${state.correct} words`;
    emoji = state.correct >= 25 ? '🏆' : state.correct >= 15 ? '🎉' : '⏱️';
    breakdown = `
      <div class="rb-item"><div class="rb-val" style="color:var(--green)">${state.correct}</div><div class="rb-label">Correct</div></div>
      <div class="rb-item"><div class="rb-val" style="color:var(--red)">${state.wrong}</div><div class="rb-label">Wrong</div></div>
      <div class="rb-item"><div class="rb-val">60s</div><div class="rb-label">Duration</div></div>
    `;
    payload = {
      username: state.username, chapter: state.chapter, mode: 'speed',
      correct: state.correct, wrong: state.wrong, score: state.correct,
    };
  } else if (m === 'flashcard') {
    const total = state.flashcardEasy + state.flashcardHard + state.flashcardUnknown;
    const pct = total ? Math.round((state.flashcardEasy + state.flashcardHard * 0.5) / total * 100) : 0;
    scoreText = `${pct}%`;
    emoji = scoreEmoji(pct);
    breakdown = `
      <div class="rb-item"><div class="rb-val" style="color:var(--green)">${state.flashcardEasy}</div><div class="rb-label">Easy</div></div>
      <div class="rb-item"><div class="rb-val" style="color:var(--yellow)">${state.flashcardHard}</div><div class="rb-label">Hard</div></div>
      <div class="rb-item"><div class="rb-val" style="color:var(--red)">${state.flashcardUnknown}</div><div class="rb-label">Unknown</div></div>
    `;
    // Save as accuracy-style progress (easy=correct, hard/unknown=wrong)
    payload = {
      username: state.username, chapter: state.chapter, mode: 'flashcard',
      correct: state.flashcardEasy,
      wrong: state.flashcardHard + state.flashcardUnknown,
    };
  } else {
    const total = state.correct + state.wrong;
    const pct = total ? Math.round(state.correct / total * 100) : 0;
    scoreText = `${pct}%`;
    emoji = scoreEmoji(pct);
    const streakHtml = (m === 'mcq' && state.bestStreak >= 3) ? `
      <div class="rb-item"><div class="rb-val" style="color:var(--yellow)">🔥 ${state.bestStreak}</div><div class="rb-label">Best streak</div></div>
    ` : '';
    breakdown = `
      <div class="rb-item"><div class="rb-val" style="color:var(--green)">${state.correct}</div><div class="rb-label">Correct</div></div>
      <div class="rb-item"><div class="rb-val" style="color:var(--red)">${state.wrong}</div><div class="rb-label">Wrong</div></div>
      <div class="rb-item"><div class="rb-val">${total}</div><div class="rb-label">Total</div></div>
      ${streakHtml}
    `;
    payload = {
      username: state.username, chapter: state.chapter, mode: m,
      correct: state.correct, wrong: state.wrong,
    };
  }

  try { await api('POST', '/api/progress', payload); }
  catch (e) { console.warn('Could not save progress', e); }

  showScreen('results-screen');
  $('results-emoji').textContent = emoji;
  $('results-score').textContent = scoreText;
  $('results-label').textContent = `Chapter ${state.chapter} · ${MODE_LABELS[m]}`;
  $('results-breakdown').innerHTML = breakdown;
  $('lb-chapter').textContent = state.chapter;
  $('lb-mode').textContent = MODE_LABELS[m];

  playFanfare();

  renderMistakes();
  loadLeaderboard();
}

function renderMistakes() {
  const container = $('mistakes-container');
  if (state.mistakes.length === 0) {
    container.innerHTML = `
      <div class="perfect-card">
        ✨ Perfect — no mistakes! ✨
      </div>
    `;
    return;
  }

  const rows = state.mistakes.map(m => `
    <div class="mistake-row">
      <div class="mistake-q">${escapeHtml(m.question)}</div>
      <div class="mistake-arrow">→</div>
      <div>
        <span class="mistake-a">${escapeHtml(m.answer)}</span>
        <span class="mistake-given">you: ${escapeHtml(m.given)}</span>
      </div>
    </div>
  `).join('');

  container.innerHTML = `
    <div class="mistakes-card">
      <div class="mistakes-header">
        <span>📚 Words to review</span>
        <span class="mistakes-count">${state.mistakes.length} ${state.mistakes.length === 1 ? 'mistake' : 'mistakes'}</span>
      </div>
      ${rows}
    </div>
  `;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

async function loadLeaderboard() {
  const rows = $('lb-rows');
  rows.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await api('GET', `/api/leaderboard/${state.chapter}?mode=${state.gameMode}`);
    if (!data.length) {
      rows.innerHTML = '<div class="lb-row" style="color:var(--muted)">No scores yet — be the first!</div>';
      return;
    }

    const isBestScoreMode = state.gameMode === 'survival' || state.gameMode === 'speed';

    rows.innerHTML = data.map((entry, i) => {
      const rankStr = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
      const isMe = entry.username === state.username;
      const display = isBestScoreMode
        ? `${entry.best_score} words`
        : `${entry.score}%`;
      const color = isBestScoreMode
        ? 'var(--accent)'
        : entry.score >= 80 ? 'var(--green)' : entry.score >= 50 ? 'var(--yellow)' : 'var(--red)';
      return `
        <div class="lb-row" style="${isMe ? 'background:rgba(91,127,255,.08)' : ''}">
          <div class="lb-rank">${rankStr}</div>
          <div class="lb-name">${entry.username}${isMe ? ' <span style="color:var(--accent);font-size:.75rem">(you)</span>' : ''}</div>
          <div class="lb-score" style="color:${color}">${display}</div>
        </div>
      `;
    }).join('');
  } catch (e) {
    rows.innerHTML = '<div class="lb-row">Could not load leaderboard.</div>';
  }
}
</script>
