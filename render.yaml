services:
  - type: web
    name: svenska-game
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URL
        sync: false   # Set this in Render dashboard to your Atlas URI
      - key: MONGO_DB_NAME
        value: svenska
